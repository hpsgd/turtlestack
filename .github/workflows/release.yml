name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      # release-please must open its PR with a GitHub App token, not the default
      # GITHUB_TOKEN. PRs created by GITHUB_TOKEN do not trigger workflows (the
      # anti-recursion safeguard), so the required "PR Title" check never runs
      # and the release PR sits BLOCKED forever. An App token is a distinct
      # actor, so its PR fires the normal checks. Credentials are org secrets
      # shared across repos that use release-please.
      # RELEASE_BOT_APP_ID holds the App's *Client ID* (the action's `app-id`
      # input is deprecated in favour of `client-id`, which accepts it).
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-images:
    name: Publish ${{ matrix.image.name }}
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: turtlestack-publishing-document-pdf
            dockerfile: plugins/practices/publishing/scripts/Dockerfile
            context: plugins/practices/publishing
          - name: turtlestack-coordinator-meeting-pdf
            dockerfile: plugins/leadership/coordinator/scripts/Dockerfile
            context: plugins
          - name: turtlestack-remarkable
            dockerfile: plugins/practices/publishing/scripts/Dockerfile.remarkable
            context: plugins/practices/publishing/scripts
          - name: turtlestack-web-snapshot
            dockerfile: plugins/research/web-tools/skills/web-snapshot/scripts/Dockerfile
            context: plugins/research/web-tools/skills/web-snapshot/scripts
          - name: turtlestack-content-retrieval-playwright
            dockerfile: plugins/research/web-tools/skills/content-retrieval/scripts/Dockerfile
            context: plugins/research/web-tools/skills/content-retrieval/scripts
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # arm64 builds run via QEMU on amd64 runners. Acceptable for the small
      # images (~seconds). For the two ~4GB Playwright images this can take
      # 30–60 min each — if release times become painful, split those two into
      # a matrix-per-arch job using ubuntu-24.04-arm native runners and
      # assemble with `docker buildx imagetools create`.
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/hpsgd/${{ matrix.image.name }}:${{ needs.release-please.outputs.version }}
            ghcr.io/hpsgd/${{ matrix.image.name }}:latest
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
